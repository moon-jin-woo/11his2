<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한국사 사료 암기</title>

<style>
body { margin:0; font-family:sans-serif; background:#f3f4f6; }

header {
  background:#111827;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
}

.toggle {
  cursor:pointer;
  font-size:20px;
  margin-right:15px;
}

.container {
  display:flex;
  height:calc(100vh - 60px);
}

.menu {
  width:260px;
  background:#1f2937;
  color:white;
  overflow:auto;
  transition:0.3s;
}
.menu.hide { width:0; }

.menu div {
  padding:10px;
  border-bottom:1px solid #374151;
  cursor:pointer;
}
.menu div:hover { background:#374151; }

.content {
  flex:1;
  display:flex;
  gap:10px;
  padding:10px;
}

.card {
  flex:1;
  background:white;
  border-radius:10px;
  padding:15px;
  overflow:auto;
}

.block { margin-bottom:15px; }

.label {
  font-weight:bold;
  margin-bottom:5px;
}
.topic { color:#2563eb; }
.summary { color:#16a34a; }
.background { color:#ca8a04; }
.result { color:#dc2626; }

.nav {
  position:fixed;
  bottom:10px;
  left:10px;
}
button {
  padding:10px;
  margin-right:5px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="toggle" onclick="toggleMenu()">☰</div>
  한국사 사료 암기
  <div style="margin-left:auto" id="count"></div>
</header>

<div class="container">

  <div class="menu" id="menu"></div>

  <div class="content">
    <div class="card">
      <h2 id="sourceTitle"></h2>
      <p id="sourceText"></p>
    </div>

    <div class="card">
      <h2 id="analysisTitle"></h2>
      <div id="analysisBody"></div>
    </div>
  </div>

</div>

<div class="nav">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>

/* 🔥 여기다가 35개 넣으면 끝 */
const data = [
{
title:"병인양요",
source:"프랑스 군대가 강화도를 공격하였다.",
analysis:{
topic:"프랑스 침략 저항",
summary:"프랑스군에 대응",
background:["천주교 탄압","프랑스 보복"],
result:["척화비 건립","반외세 강화"]
}
},
{
title:"척화비",
source:"서양과 싸우지 않으면 나라를 판다.",
analysis:{
topic:"외세 배척 정책",
summary:"통상 거부",
background:["양요","쇄국"],
result:["반외세 강화","개항 지연"]
}
}
];

let current = 0;

function render() {
  const item = data[current];

  document.getElementById('sourceTitle').textContent = item.title;
  document.getElementById('analysisTitle').textContent = item.title;

  document.getElementById('sourceText').textContent = item.source;

  document.getElementById('analysisBody').innerHTML = `
    <div class="block">
      <div class="label topic">주제</div>
      <div>${item.analysis.topic}</div>
    </div>

    <div class="block">
      <div class="label summary">요약</div>
      <div>${item.analysis.summary}</div>
    </div>

    <div class="block">
      <div class="label background">배경</div>
      <ul>
        ${item.analysis.background.map(v => `<li>${v}</li>`).join("")}
      </ul>
    </div>

    <div class="block">
      <div class="label result">결과</div>
      <ul>
        ${item.analysis.result.map(v => `<li>${v}</li>`).join("")}
      </ul>
    </div>
  `;

  document.getElementById('count').textContent =
    (current + 1) + " / " + data.length;
}

function next(){
  if(current < data.length-1){
    current++;
    render();
  }
}
function prev(){
  if(current > 0){
    current--;
    render();
  }
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("hide");
}

function buildMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  data.forEach((d,i)=>{
    const div = document.createElement("div");
    div.innerText = (i+1)+". "+d.title;
    div.onclick = ()=>{
      current = i;
      render();
    };
    menu.appendChild(div);
  });
}

buildMenu();
render();

</script>

</body>
</html>
