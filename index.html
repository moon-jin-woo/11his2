<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한국사 사료 암기</title>

<style>
body { margin:0; font-family:sans-serif; background:#f3f4f6; }

header {
  background:#111827;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
}

.toggle {
  cursor:pointer;
  font-size:20px;
  margin-right:15px;
}

.container {
  display:flex;
  height:calc(100vh - 60px);
}

.menu {
  width:260px;
  background:#1f2937;
  color:white;
  overflow:auto;
  transition:0.3s;
}
.menu.hide { width:0; }

.menu div {
  padding:10px;
  border-bottom:1px solid #374151;
  cursor:pointer;
}
.menu div:hover { background:#374151; }

.content {
  flex:1;
  display:flex;
  gap:10px;
  padding:10px;
}

.card {
  flex:1;
  background:white;
  border-radius:10px;
  padding:15px;
  overflow:auto;
}

.block { margin-bottom:15px; }

.label { font-weight:bold; margin-bottom:5px; }
.topic { color:#2563eb; }
.summary { color:#16a34a; }
.background { color:#ca8a04; }
.result { color:#dc2626; }

.nav {
  position:fixed;
  bottom:10px;
  left:10px;
}
button {
  padding:10px;
  margin-right:5px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="toggle" onclick="toggleMenu()">☰</div>
  한국사 사료 암기
  <div style="margin-left:auto" id="count"></div>
</header>

<div class="container">

  <div class="menu" id="menu"></div>

  <div class="content">
    <div class="card">
      <h2 id="sourceTitle"></h2>
      <p id="sourceText"></p>
    </div>

    <div class="card">
      <h2 id="analysisTitle"></h2>
      <div id="analysisBody"></div>
    </div>
  </div>

</div>

<div class="nav">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>

/* 🔥 35개 데이터 */
const data = [
{title:"병인양요",source:"프랑스 군대가 강화도를 공격하였다.",analysis:{topic:"프랑스 침략 저항",summary:"프랑스군과 교전",background:["천주교 탄압","프랑스 보복"],result:["척화비 건립","반외세 강화"]}},
{title:"제너럴셔먼호 사건",source:"이양선을 불태웠다.",analysis:{topic:"통상 충돌",summary:"미국 상선 격침",background:["통상 요구","쇄국"],result:["신미양요 계기","미국 충돌"]}},
{title:"신미양요",source:"조선군이 끝까지 싸웠다.",analysis:{topic:"미국 침략 저항",summary:"조선군 항전",background:["셔먼호 사건","미국 공격"],result:["쇄국 유지","항전 강화"]}},
{title:"척화비",source:"서양과 싸우지 않으면 나라를 판다.",analysis:{topic:"외세 배척",summary:"통상 거부",background:["양요","쇄국"],result:["반외세 강화","개항 지연"]}},
{title:"흥선대원군 정책",source:"통상을 거부한다.",analysis:{topic:"쇄국정책",summary:"외교 차단",background:["서양 침략","전통 유지"],result:["고립","근대화 지연"]}},
{title:"이항로 주장",source:"서양은 물리쳐야 한다.",analysis:{topic:"위정척사",summary:"외세 배척 주장",background:["유교 질서","외세"],result:["척사운동","개항 반대"]}},
{title:"박규수 주장",source:"교류 필요",analysis:{topic:"개화 주장",summary:"외교 필요성",background:["열강 경쟁","고립"],result:["개화파 형성","개항 논의"]}},
{title:"운요호 사건",source:"일본 군함 도발",analysis:{topic:"개항 압박",summary:"무력 시위",background:["일본 팽창","조선 쇄국"],result:["강화도 조약","개항"]}},
{title:"강화도 조약",source:"조선은 자주국이다.",analysis:{topic:"불평등 조약",summary:"일본 특권 인정",background:["운요호","압박"],result:["개항","치외법권"]}},
{title:"조미수호통상조약",source:"미국과 조약 체결",analysis:{topic:"미국과 조약",summary:"최혜국 대우",background:["개항","외교"],result:["외교 확대","열강 진출"]}},
{title:"조선책략",source:"친중결일연미",analysis:{topic:"외교 전략",summary:"러시아 견제",background:["러시아","위기"],result:["개화 확산","반발"]}},
{title:"영남만인소",source:"조선책략 반대",analysis:{topic:"척사 상소",summary:"외세 반대",background:["조선책략","유교"],result:["척사 강화","갈등"]}},
{title:"임오군란",source:"구식군 봉기",analysis:{topic:"군인 반란",summary:"차별 반발",background:["군대 차별","부패"],result:["일본 개입","조약"]}},
{title:"제물포조약",source:"일본에 배상",analysis:{topic:"일본 요구",summary:"배상 및 주둔",background:["임오군란","일본"],result:["간섭 강화","재정 부담"]}},
{title:"갑신정변",source:"개혁 추진",analysis:{topic:"급진 개화",summary:"근대화 시도",background:["개화파","일본"],result:["3일 실패","한계"]}},
{title:"동학농민운동",source:"탐관오리 처벌",analysis:{topic:"농민 봉기",summary:"수탈 반발",background:["수탈","불평등"],result:["개혁 요구","확산"]}},
{title:"폐정개혁안",source:"개혁 요구",analysis:{topic:"제도 개혁",summary:"부패 척결",background:["농민 봉기","수탈"],result:["개혁안","운동 강화"]}},
{title:"전봉준 공초",source:"수탈과 탄압",analysis:{topic:"봉기 이유",summary:"탄압 원인",background:["수탈","탄압"],result:["재봉기","확대"]}},
{title:"홍범14조",source:"자주독립",analysis:{topic:"갑오개혁",summary:"근대 개혁",background:["청 약화","개혁"],result:["제도 변화","근대화"]}},
{title:"을미사변",source:"명성황후 시해",analysis:{topic:"일본 침략",summary:"왕비 살해",background:["일본","권력"],result:["반일","아관파천"]}},
{title:"단발령",source:"머리 자르기",analysis:{topic:"전통 충돌",summary:"유교 반발",background:["개혁","문화"],result:["의병","저항"]}},
{title:"아관파천",source:"러시아 공사관 이동",analysis:{topic:"왕권 보호",summary:"피신",background:["을미사변","위협"],result:["친러","일본 약화"]}},
{title:"독립협회",source:"자주독립 주장",analysis:{topic:"개혁 운동",summary:"민권 확대",background:["개화","외세"],result:["개혁 운동","참여"]}},
{title:"헌의6조",source:"개혁안 제시",analysis:{topic:"입헌 개혁",summary:"정치 개혁",background:["독립협회","민권"],result:["제도 시도","운동"]}},
{title:"대한제국",source:"황제 즉위",analysis:{topic:"국가 격상",summary:"제국 선포",background:["자주성","국제"],result:["체제 강화","독립"]}},
{title:"대한국국제",source:"황제 권한 강화",analysis:{topic:"헌법",summary:"황제 중심",background:["제국","권력"],result:["권력 강화","법"]}}
];

let current = 0;

function render(){
  const item = data[current];

  document.getElementById('sourceTitle').textContent = item.title;
  document.getElementById('analysisTitle').textContent = item.title;
  document.getElementById('sourceText').textContent = item.source;

  document.getElementById('analysisBody').innerHTML = `
    <div class="block"><div class="label topic">주제</div>${item.analysis.topic}</div>
    <div class="block"><div class="label summary">요약</div>${item.analysis.summary}</div>
    <div class="block"><div class="label background">배경</div><ul>${item.analysis.background.map(v=>`<li>${v}</li>`).join("")}</ul></div>
    <div class="block"><div class="label result">결과</div><ul>${item.analysis.result.map(v=>`<li>${v}</li>`).join("")}</ul></div>
  `;

  document.getElementById('count').textContent =
    (current+1)+" / "+data.length;
}

function next(){ if(current < data.length-1){ current++; render(); } }
function prev(){ if(current > 0){ current--; render(); } }

function toggleMenu(){
  document.getElementById("menu").classList.toggle("hide");
}

function buildMenu(){
  const menu = document.getElementById("menu");
  data.forEach((d,i)=>{
    const div = document.createElement("div");
    div.innerText = (i+1)+". "+d.title;
    div.onclick = ()=>{ current=i; render(); };
    menu.appendChild(div);
  });
}

buildMenu();
render();

</script>

</body>
</html>
