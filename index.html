<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한국사 사료 암기</title>

<style>
body { margin:0; font-family:sans-serif; background:#f3f4f6; }

header {
  background:#111827;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
}

.toggle {
  cursor:pointer;
  font-size:20px;
  margin-right:15px;
}

.container {
  display:flex;
  height:calc(100vh - 60px);
}

/* 메뉴 */
.menu {
  width:260px;
  background:#1f2937;
  color:white;
  overflow:auto;
  transition:0.3s;
}
.menu.hide { width:0; }

.menu div {
  padding:10px;
  border-bottom:1px solid #374151;
  cursor:pointer;
}
.menu div:hover { background:#374151; }

/* 콘텐츠 */
.content {
  flex:1;
  display:flex;
  gap:10px;
  padding:10px;
}

.card {
  flex:1;
  background:white;
  border-radius:10px;
  padding:15px;
  overflow:auto;
}

/* 버튼 */
.nav {
  position:fixed;
  bottom:10px;
  left:10px;
}
button {
  padding:10px;
  margin-right:5px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="toggle" onclick="toggleMenu()">☰</div>
  한국사 사료 암기
  <div style="margin-left:auto" id="count"></div>
</header>

<div class="container">

  <div class="menu" id="menu"></div>

  <div class="content">
    <div class="card" id="left"></div>
    <div class="card" id="right"></div>
  </div>

</div>

<div class="nav">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>
let data = [];
let current = 0;

/* JSON 불러오기 */
fetch("data.json")
.then(res => res.json())
.then(json => {
    data = json;
    buildMenu();
    render();
});

/* 화면 */
function render(){
    const item = data[current];

    document.getElementById("left").innerHTML =
        "<h2>📜 " + item.title + "</h2><p>" + item.source + "</p>";

    document.getElementById("right").innerHTML =
        "<h3>주제</h3>" + item.analysis.topic +
        "<h3>요약</h3>" + item.analysis.summary +
        "<h3>배경</h3>" + item.analysis.background.join("<br>") +
        "<h3>결과</h3>" + item.analysis.result.join("<br>");

    document.getElementById("count").innerText =
        (current+1) + " / " + data.length;
}

/* 이동 */
function next(){
    if(current < data.length-1){
        current++;
        render();
    }
}
function prev(){
    if(current > 0){
        current--;
        render();
    }
}

/* 메뉴 */
function buildMenu(){
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    data.forEach((d,i)=>{
        const div = document.createElement("div");
        div.innerText = (i+1) + ". " + d.title;
        div.onclick = ()=>{
            current = i;
            render();
        };
        menu.appendChild(div);
    });
}

/* 메뉴 접기 */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("hide");
}
</script>

</body>
</html>
